<style>
:root{
  --bg:#f4f4f6;
  --purple:#534AB7;
  --cyan:#04A1D4;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --radius-sm:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:'Plus Jakarta Sans',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem 1.25rem;
  text-align:center;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(83,74,183,.07) 1px,transparent 1px),
    linear-gradient(90deg,rgba(83,74,183,.07) 1px,transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse 120% 60% at 50% 0%,#000 20%,transparent 70%);
}
.wrap{
  position:relative;z-index:1;
  max-width:440px;width:100%;
}

/* Logo */
.ns-logo{
  display:inline-block;
  width:72px;height:72px;border-radius:18px;
  overflow:hidden;margin-bottom:1.5rem;
}
.ns-logo img{width:100%;height:100%;object-fit:cover;display:block}

h1{
  font-size:1.65rem;font-weight:800;letter-spacing:-.035em;
  color:var(--text);margin-bottom:.6rem;
}
.desc{
  font-size:.95rem;color:var(--muted);line-height:1.75;
  margin-bottom:.5rem;
}
.author-row{
  display:flex;align-items:center;justify-content:center;gap:.6rem;
  margin-bottom:2rem;
}
.author-av{
  width:32px;height:32px;border-radius:50%;
  object-fit:cover;border:2px solid var(--border);flex-shrink:0;
}
.meta{font-size:.78rem;font-weight:600;color:var(--muted)}
.meta span{color:var(--purple)}

/* Form */
form{display:flex;flex-direction:column;gap:.65rem;margin-bottom:1.25rem}

.input-row{
  display:flex;gap:.5rem;
}
input[type="email"]{
  flex:1;min-width:0;
  padding:.72rem 1rem;
  font-family:'Plus Jakarta Sans',system-ui,sans-serif;
  font-size:.9rem;color:var(--text);
  background:#fff;border:1px solid var(--border);
  border-radius:var(--radius-sm);outline:none;
  transition:border-color .18s,box-shadow .18s;
}
input[type="email"]:focus{
  border-color:var(--purple);
  box-shadow:0 0 0 3px rgba(83,74,183,.1);
}
input[type="email"]::placeholder{color:#9ca3af}

button[type="submit"]{
  flex-shrink:0;
  padding:.72rem 1.25rem;
  font-family:'Plus Jakarta Sans',system-ui,sans-serif;
  font-size:.9rem;font-weight:700;color:#fff;
  background:var(--purple);border:none;border-radius:var(--radius-sm);
  cursor:pointer;white-space:nowrap;
  box-shadow:0 4px 14px rgba(83,74,183,.3);
  transition:box-shadow .18s,transform .12s;
}
button[type="submit"]:hover{
  box-shadow:0 6px 20px rgba(83,74,183,.45);
  transform:translateY(-1px);
}
button[type="submit"]:active{transform:translateY(0)}

.terms{font-size:.7rem;color:var(--muted);line-height:1.6}

.msg{
  display:none;padding:.55rem .9rem;border-radius:var(--radius-sm);
  font-size:.78rem;font-weight:600;
}
.msg.error{background:#fef2f2;color:#b91c1c;border:1px solid #fca5a5}

.skip{
  display:inline-flex;align-items:center;gap:.25rem;
  font-size:.82rem;color:var(--muted);text-decoration:none;
  transition:color .15s;
}
.skip:hover{color:var(--text)}

@media(max-width:420px){
  .input-row{flex-direction:column}
  button[type="submit"]{width:100%}
}
</style>
</head>
<body>

<div class="wrap">

  <div class="ns-logo">
    <img src="ns.png" alt="Neural Studio">
  </div>

  <h1>Neural Studio</h1>
  <p class="desc">Las buenas intenciones no construyeron nada.<br>La ejecución sí. Aquí construimos en vivo.</p>
  <div class="author-row">
    <img class="author-av" src="sebastian.png" alt="Sebastián Hortúa">
    <p class="meta">Por Sebastián Hortúa · <span>Regístrate 100% Gratis</span></p>
  </div>

  <form id="sub-form">
    <div class="input-row">
      <input type="email" id="email" placeholder="tu@email.com" required autocomplete="email">
      <button type="submit">Unirme</button>
    </div>
    <p class="terms">Al suscribirte aceptas recibir contenido de Neural Studio. Sin spam.</p>
    <div class="msg" id="msg"></div>
  </form>

  <p class="skip">La comunidad gratuita para construir, validar y lanzar productos con IA.</p>

</div>

<script>
document.getElementById('sub-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const btn = this.querySelector('button');
  const msg = document.getElementById('msg');

  btn.textContent = '...';
  btn.disabled = true;
  msg.style.display = 'none';

  try {
    const res = await fetch('https://n8n.srv864443.hstgr.cloud/webhook/neural-studio-subscribe', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, source:'subscribe-page'})
    });
    if (res.ok) {
      fbq('track','CompleteRegistration');
      window.location.href = 'subscribe-gracias.html';
    } else {
      throw new Error();
    }
  } catch {
    msg.textContent = 'Algo salió mal. Intenta de nuevo.';
    msg.className = 'msg error';
    msg.style.display = 'block';
    btn.textContent = 'Unirme';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
